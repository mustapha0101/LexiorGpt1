version: '3.8'

services:
  # 1. vLLM Engine - Inférence GPU
  vllm:
    image: vllm/vllm-openai:v0.5.2
    command: >
      --model ${GEN_MODEL:-Qwen/Qwen2.5-32B-Instruct-AWQ}
      --quantization awq
      --port 8000
      --max-model-len 16384
      --gpu-memory-utilization 0.95
      --enable-prefix-caching
      --enable-auto-tool-choice
      --tool-call-parser hermes
    environment:
      - HF_TOKEN=${HF_TOKEN}
    volumes:
      # Stockage persistant pour les poids des modèles téléchargés
      - model-cache:/root/.cache/huggingface
    networks:
      - lexior-network
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # 2. LiteLLM Proxy - Passerelle d'API et Clés d'Accès
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    command: --config /app/config.yaml --port 4000
    environment:
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:-master-key-lexior-2026}
    volumes:
      - ./litellm-config.yaml:/app/config.yaml:ro
    networks:
      - lexior-network
    depends_on:
      - vllm
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  # 3. Nginx Reverse Proxy - Sécurité HTTPS & Terminaison SSL
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ${SSL_CERT_PATH:-./certs/ssl_cert.crt}:/etc/nginx/certs/ssl_cert.crt:ro
      - ${SSL_KEY_PATH:-./certs/ssl_key.key}:/etc/nginx/certs/ssl_key.key:ro
    networks:
      - lexior-network
    depends_on:
      - litellm
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  # 4. Lexior Notebook Frontend Application
  notebook:
    image: nginx:alpine  # Image d'accueil pour le Notebook en production
    volumes:
      - ./notebook-dist:/usr/share/nginx/html:ro
    networks:
      - lexior-network
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

networks:
  lexior-network:
    driver: overlay
    attachable: true

volumes:
  model-cache:
    driver: local
